name: juncal-stack

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: juncal-app:local
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: "file:./prisma/data/prod.db"
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
      NEXT_TELEMETRY_DISABLED: "1"
    volumes:
      - juncal-data:/app/prisma/data
      - ./uploads:/app/uploads
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/login"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

volumes:
  juncal-data:
