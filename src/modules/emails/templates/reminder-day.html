<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { font-family: Arial, sans-serif; background: #f5f6f4; padding: 20px; }
    .container { max-width: 600px; margin: 0 auto; background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .header { background: #7f9976; color: white; padding: 24px; text-align: center; }
    .content { padding: 24px; color: #0f172a; }
    .highlight { background: #f1f4ef; border-left: 4px solid #7f9976; padding: 12px; margin: 16px 0; }
    .footer { padding: 16px 24px; background: #f5f6f4; text-align: center; font-size: 12px; color: #51606b; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Sanatorio Juncal</h1>
    </div>
    <div class="content">
      <h2>Hoy tenés un turno</h2>
      <p>Hola <strong>{{name}}</strong>,</p>
      <p>Te recordamos que hoy tenés asignado el siguiente turno:</p>
      <div class="highlight">
        <p><strong>Especialidad:</strong> {{specialty}}</p>
        <p><strong>Horario:</strong> {{startTime}} - {{endTime}}</p>
      </div>
      <p>¡Que tengas un buen día!</p>
    </div>
    <div class="footer">
      Sanatorio Juncal — Gestión de Guardias
    </div>
  </div>
</body>
</html>
